<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Travel Planner</title>
    <link rel="stylesheet" href="index.css">
    <script src="./libs/angular/angular.min.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <div ng-controller="header" class="header">
        <div class="flexbox">

            <div class="flex-item everythingElse">
                <p class="slogan">Planning a vacation has never been easier</p>
                <p class = "poweredBy">Powered by Jash Patel<p>
            </div>

            <div class="flex-item image">
                <img src="img/headerBackgroundImage.png" alt="Green Travel Planner Image">
            </div>

        </div>
        
    </div>

    <div ng-controller="aboutTheApp">
        <div class = "about">
            <div class = "aboutTitle">
                <p>What is the <span> Green Travel Planner</span>?</p>
            </div>
        </div>
    </div>
</body>
</html>
